{% extends "base.html" %}
{% block title %}Page Not Found — Bhetamल{% endblock %}

{% block body %}
<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;text-align:center;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text)">
  <div style="font-size:72px;margin-bottom:16px">📍</div>
  <h1 style="font-family:'Playfair Display',serif;font-size:36px;font-weight:700;color:var(--primary);margin-bottom:8px">Oops! Page Not Found</h1>
  <p style="color:var(--muted);font-size:16px;max-width:420px;margin-bottom:24px;line-height:1.5">
    The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.
  </p>
  <div style="display:flex;gap:12px">
    <a href="/" style="display:inline-flex;align-items:center;gap:8px;background:var(--primary);color:#fff;padding:12px 24px;border-radius:12px;font-size:14px;font-weight:600;text-decoration:none;box-shadow:0 4px 14px rgba(20,50,42,.2)">
      Go to Dashboard →
    </a>
  </div>
</div>
{% endblock %}
