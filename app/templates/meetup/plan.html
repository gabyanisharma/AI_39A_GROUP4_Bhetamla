{% extends "base_dashboard.html" %}
{% set active_page = 'plan' %}
{% block title %}Plan Meetup — Bhetamla{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
    /* Remove default padding from the content wrapper so the map can touch the edges */
    .page-content {
        padding: 0 !important;
        position: relative;
        overflow: hidden;
    }

    #map {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
    }

    /* Floating Control Panel */
    .floating-card {
        position: absolute;
        top: 24px;
        left: 24px;
        width: 350px;
        z-index: 1000;
        /* Stays above the map */
        background: var(--card);
        padding: 24px;
        border-radius: 16px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        border: 1px solid var(--border);
    }
</style>
{% endblock %}

{% block content %}
<div id="map"></div>

<div class="floating-card">
    <div class="card-title">📅 Coordinate Safe Meetup</div>
    <form action="/create-meetup" method="POST">
        <div class="form-group">
            <label>Purpose</label>
            <input type="text" name="purpose" placeholder="e.g. Study Group" required>
        </div>
        <div class="form-group">
            <label>Location</label>
            <input type="text" id="coords" name="location" readonly placeholder="Click map to select..." required>
        </div>
        <button type="submit" class="btn-create" style="width: 100%; padding: 12px; cursor: pointer;">Finalize
            Meetup</button>
    </form>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    var map = L.map('map', { zoomControl: false }).setView([27.7172, 85.3240], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    var marker;

    // Helper function to update the input and set the marker
    function setMarker(latlng) {
        if (marker) map.removeLayer(marker);
        marker = L.marker(latlng).addTo(map);
        document.getElementById('coords').value = latlng.lat.toFixed(6) + ", " + latlng.lng.toFixed(6);
    }

    // 1. Click to set marker anywhere
    map.on('click', function (e) {
        setMarker(e.latlng);
    });

    // 2. Auto-locate and set marker
    map.locate({ setView: true, maxZoom: 16 });

    map.on('locationfound', function (e) {
        // Set the marker at current location
        setMarker(e.latlng);
    });

    map.on('locationerror', function (e) {
        alert("Location access denied. Please click on the map to set your location.");
    });
    // Access the data injected by your meetup_controller
    const restaurantData = {{ restaurants | tojson | safe }};

    // Now you can plot them on your map
    restaurantData.forEach(r => {
        if (r.lat && r.lng) {
            L.marker([r.lat, r.lng]).addTo(map).bindPopup("<b>" + r.name + "</b>");
        }
    });
</script>
{% endblock %}
