{% extends "base.html" %}
{% block title %}Login — Bhetamल{% endblock %}

{% block body %}
<div id="login" class="screen active" role="main">
  <div class="login-center-wrap">
    <div class="login-brand-centered">
      <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Bhetam logo" style="height:100px;width:auto;margin-bottom:8px;object-fit:contain">
      <div class="login-brand-sub">Coordinate with effortless ease</div>
    </div>
    <div class="login-card-centered">
      <form method="POST" action="{{ url_for('auth.login') }}" onsubmit="return handleAuthSubmit(this)">
        <div style="margin-bottom:18px;">
          <label class="field-label" for="login-email">Email Address</label>
          <input class="field-input" id="login-email" name="email" type="email" placeholder="hello@example.com" autocomplete="email" required />
        </div>
        <div>
          <label class="field-label" for="login-password">Password</label>
          <div class="password-wrap">
            <input class="field-input" id="login-password" name="password" type="password" placeholder="Enter your password" autocomplete="current-password" required />
            <button type="button" class="pw-toggle" onclick="togglePassword('login-password', this)" aria-label="Show password">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <a class="forgot-link" href="{{ url_for('auth.forgot_password') }}">Forgot Password?</a>
        </div>
        <button class="btn-primary" type="submit">
          <span>Continue with Email</span>
        </button>
      </form>
      <div class="login-foot">
        <span>Don't have an account?</span>
        <a href="{{ url_for('auth.register') }}"> Sign up for free</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
