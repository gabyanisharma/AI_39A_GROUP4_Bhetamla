{% extends "base.html" %}
{% block title %}Login — Bhetamल{% endblock %}

{% block body %}
<div id="login" class="screen active" role="main">
  <div class="login-center-wrap">
    <div class="login-brand-centered">
      <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Bhetam logo" style="height:100px;width:auto;margin-bottom:8px;object-fit:contain">
      <div class="login-brand-sub">Coordinate with effortless ease</div>
    </div>
    <div class="login-card-centered">
      <form method="POST" action="{{ url_for('auth.login') }}">
        <div style="margin-bottom:18px;">
          <label class="field-label" for="login-email">Email Address</label>
          <input class="field-input" id="login-email" name="email" type="email" placeholder="hello@example.com" required />
        </div>
        <div>
          <label class="field-label" for="login-password">Password</label>
          <input class="field-input" id="login-password" name="password" type="password" placeholder="Enter your password" required />
          <a class="forgot-link" href="{{ url_for('auth.forgot_password') }}">🔑 Forgot Password?</a>
        </div>
        <button class="btn-primary" type="submit">
          <span>Continue with Email</span>
        </button>
      </form>
      <div class="login-foot">
        <span>Don't have an account?</span>
        <a href="{{ url_for('auth.register') }}"> Sign up for free</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
