{% extends "base.html" %}
{% block title %}Reset Password — Bhetamल{% endblock %}

{% block extra_css %}
<style>
    .auth-wrapper {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #EFF6FF 0%, #DBEAFE 100%);
        padding: 40px 20px;
    }
    .auth-card {
        background: var(--card);
        border-radius: 20px;
        padding: 48px 40px;
        width: 100%;
        max-width: 420px;
        box-shadow: var(--shadow);
        text-align: center;
    }
    .icon { font-size: 48px; margin-bottom: 16px; }
    h2 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    p  { color: var(--text-muted); font-size: 14px; margin-bottom: 28px; }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="icon">🔒</div>
        <h2>Set a New Password</h2>
        <p>Choose a strong password of at least 6 characters.</p>

        <form method="POST" action="{{ url_for('auth.reset_password', token=token) }}">
            <div class="form-group" style="text-align:left">
                <label>New Password</label>
                <input type="password" name="password" placeholder="Min 6 characters" required />
            </div>
            <div class="form-group" style="text-align:left">
                <label>Confirm New Password</label>
                <input type="password" name="confirm_password" placeholder="Repeat password" required />
            </div>
            <button type="submit" class="btn btn-primary">Reset Password</button>
        </form>
    </div>
</div>
{% endblock %}
