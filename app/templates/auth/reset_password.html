{% extends "base.html" %}
{% block title %}Reset Password — Bhetamल{% endblock %}

{% block body %}
<div id="login" class="screen active" role="main">
  <div class="login-center-wrap">
    <div class="login-brand-centered">
      <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Bhetam logo" style="height:100px;width:auto;margin-bottom:8px;object-fit:contain">
    </div>
    <div class="login-card-centered">
      <div style="text-align:center;margin-bottom:20px;">
        <div style="font-size:36px;margin-bottom:10px;">&#128274;</div>
        <div class="modal-title">Reset Password</div>
        <div class="modal-sub">Choose a strong new password for your account.</div>
      </div>
      <form method="POST" action="{{ url_for('auth.reset_password', token=token) }}">
        <div style="margin-bottom:16px;">
          <label class="field-label" for="reset-new">New Password</label>
          <input class="field-input" id="reset-new" name="password" type="password" placeholder="Min 6 characters" required />
        </div>
        <div style="margin-bottom:20px;">
          <label class="field-label" for="reset-confirm">Confirm New Password</label>
          <input class="field-input" id="reset-confirm" name="confirm_password" type="password" placeholder="Repeat new password" required />
        </div>
        <button class="btn-primary" type="submit">Update Password</button>
      </form>
      <div class="login-foot">
        <a href="{{ url_for('auth.login') }}" style="color:var(--blue);font-weight:600;">← Back to Login</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
