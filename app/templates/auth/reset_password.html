{% extends "base.html" %}
{% block title %}Reset Password — Bhetamल{% endblock %}

{% block body %}
<div id="login" class="screen active" role="main">
  <div class="login-center-wrap">
    <div class="login-brand-centered">
      <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Bhetam logo" style="height:100px;width:auto;margin-bottom:8px;object-fit:contain">
    </div>
    <div class="login-card-centered">
      <div style="text-align:center;margin-bottom:20px;">
        <div style="margin-bottom:10px;">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </div>
        <div class="modal-title">Reset Password</div>
        <div class="modal-sub">Choose a strong new password for your account.</div>
      </div>
      <form method="POST" action="{{ url_for('auth.reset_password', token=token) }}" onsubmit="return handleAuthSubmit(this)">
        <div style="margin-bottom:16px;">
          <label class="field-label" for="reset-new">New Password</label>
          <div class="password-wrap">
            <input class="field-input" id="reset-new" name="password" type="password" placeholder="Min 6 characters" autocomplete="new-password" required minlength="6" />
            <button type="button" class="pw-toggle" onclick="togglePassword('reset-new', this)" aria-label="Show password">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <div style="margin-bottom:20px;">
          <label class="field-label" for="reset-confirm">Confirm New Password</label>
          <div class="password-wrap">
            <input class="field-input" id="reset-confirm" name="confirm_password" type="password" placeholder="Repeat new password" autocomplete="new-password" required minlength="6" />
            <button type="button" class="pw-toggle" onclick="togglePassword('reset-confirm', this)" aria-label="Show password">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <button class="btn-primary" type="submit">Update Password</button>
      </form>
      <div class="login-foot">
        <a href="{{ url_for('auth.login') }}" style="color:var(--blue);font-weight:600;">← Back to Login</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
