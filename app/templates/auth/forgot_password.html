{% extends "base.html" %}
{% block title %}Forgot Password — Bhetamल{% endblock %}

{% block extra_css %}
<style>
    .auth-wrapper {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #EFF6FF 0%, #DBEAFE 100%);
        padding: 40px 20px;
    }
    .auth-card {
        background: var(--card);
        border-radius: 20px;
        padding: 48px 40px;
        width: 100%;
        max-width: 420px;
        box-shadow: var(--shadow);
        text-align: center;
    }
    .icon { font-size: 48px; margin-bottom: 16px; }
    h2 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    p  { color: var(--text-muted); font-size: 14px; margin-bottom: 28px; line-height: 1.6; }
    .back-link { margin-top: 20px; font-size: 14px; color: var(--text-muted); }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="icon">🔑</div>
        <h2>Forgot your password?</h2>
        <p>Enter your registered email and we'll send you a link to reset your password.</p>

        <form method="POST" action="{{ url_for('auth.forgot_password') }}">
            <div class="form-group" style="text-align:left">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="hello@example.com" required />
            </div>
            <button type="submit" class="btn btn-primary">Send Reset Link</button>
        </form>

        <div class="back-link">
            Remember your password? <a href="{{ url_for('auth.login') }}">Back to Login</a>
        </div>
    </div>
</div>
{% endblock %}
