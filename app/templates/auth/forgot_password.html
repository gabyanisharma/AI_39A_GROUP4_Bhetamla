{% extends "base.html" %}
{% block title %}Forgot Password — Bhetamल{% endblock %}

{% block body %}
<div id="login" class="screen active" role="main">
  <div class="login-center-wrap">
    <div class="login-brand-centered">
      <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Bhetam logo" style="height:100px;width:auto;margin-bottom:8px;object-fit:contain">
    </div>
    <div class="login-card-centered">
      <div style="text-align:center;margin-bottom:20px;">
        <div style="margin-bottom:10px;">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </div>
        <div class="modal-title">Forgot Password?</div>
        <div class="modal-sub">Enter your email and we'll send you a reset link.</div>
      </div>
      <form method="POST" action="{{ url_for('auth.forgot_password') }}" onsubmit="return handleAuthSubmit(this)">
        <div style="margin-bottom:18px;">
          <label class="field-label" for="forgot-email">Email Address</label>
          <input class="field-input" id="forgot-email" name="email" type="email" placeholder="hello@example.com" autocomplete="email" required autofocus />
        </div>
        <button class="btn-primary" type="submit">Send Reset Link</button>
      </form>
      <div class="login-foot">
        <a href="{{ url_for('auth.login') }}" style="color:var(--blue);font-weight:600;">← Back to Login</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
