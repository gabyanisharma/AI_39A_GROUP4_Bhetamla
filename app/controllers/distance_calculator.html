<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Walking Distance Calculator | Bhetamल</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #EAF5F0; }
    </style>
</head>
<body class="p-6 md:p-12">
    <div class="max-w-2xl mx-auto bg-white rounded-3xl shadow-xl border border-emerald-100 overflow-hidden">
        <div class="bg-emerald-800 p-8 text-white">
            <h1 class="text-2xl font-bold">🚶 Walking Distance Calculator</h1>
            <p class="text-emerald-100 text-sm mt-1">Calculate precise foot-path metrics using OSRM engine.</p>
        </div>
        
        <form id="calc-form" class="p-8 space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Start Point -->
                <div class="space-y-4">
                    <h2 class="text-xs font-bold uppercase tracking-wider text-emerald-700">Starting Point</h2>
                    <input type="number" step="any" id="start_lat" placeholder="Latitude" required
                        class="w-full p-3 bg-emerald-50 border border-emerald-200 rounded-xl outline-none focus:border-blue-500 transition-all">
                    <input type="number" step="any" id="start_lon" placeholder="Longitude" required
                        class="w-full p-3 bg-emerald-50 border border-emerald-200 rounded-xl outline-none focus:border-blue-500 transition-all">
                </div>

                <!-- End Point -->
                <div class="space-y-4">
                    <h2 class="text-xs font-bold uppercase tracking-wider text-emerald-700">Destination</h2>
                    <input type="number" step="any" id="end_lat" placeholder="Latitude" required
                        class="w-full p-3 bg-emerald-50 border border-emerald-200 rounded-xl outline-none focus:border-blue-500 transition-all">
                    <input type="number" step="any" id="end_lon" placeholder="Longitude" required
                        class="w-full p-3 bg-emerald-50 border border-emerald-200 rounded-xl outline-none focus:border-blue-500 transition-all">
                </div>
            </div>

            <button type="submit" id="submit-btn" 
                class="w-full py-4 bg-emerald-900 hover:bg-emerald-800 text-white font-bold rounded-xl shadow-lg transition-all transform hover:-translate-y-1">
                Calculate Walking Route
            </button>
        </form>

        <!-- Result Display -->
        <div id="result-container" class="hidden p-8 border-t border-emerald-50 bg-emerald-50/50">
            <div class="flex items-center justify-around text-center">
                <div>
                    <p class="text-xs font-bold text-emerald-600 uppercase">Distance</p>
                    <p class="text-3xl font-bold text-emerald-900"><span id="res-km">0</span> km</p>
                </div>
                <div class="w-px h-12 bg-emerald-200"></div>
                <div>
                    <p class="text-xs font-bold text-emerald-600 uppercase">Time Estimate</p>
                    <p class="text-3xl font-bold text-emerald-900"><span id="time-val">0 min</span></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('calc-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('submit-btn');
            const resContainer = document.getElementById('result-container');
            
            const payload = {
                start_lat: document.getElementById('start_lat').value,
                start_lon: document.getElementById('start_lon').value,
                end_lat: document.getElementById('end_lat').value,
                end_lon: document.getElementById('end_lon').value
            };

            // UI Feedback
            btn.disabled = true;
            btn.innerText = 'Calculating...';
            resContainer.classList.add('hidden');

            try {
                const response = await fetch('/distance/calculate-walking', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();

                if (result.success) {
                    document.getElementById('res-km').innerText = result.distance_km;
                    const totalMins = Math.round(result.walking_time_min);
                    if (totalMins >= 60) {
                        const hours = Math.floor(totalMins / 60);
                        const minutes = totalMins % 60;
                        document.getElementById('time-val').innerText = `${hours} hr ${minutes} min`;
                    } else {
                        document.getElementById('time-val').innerText = `${totalMins} min`;
                    }
                    resContainer.classList.remove('hidden');
                } else {
                    alert('Error: ' + result.message);
                }
            } catch (error) {
                console.error('Fetch error:', error);
                alert('Failed to connect to the distance server. Please try again.');
            } finally {
                btn.disabled = false;
                btn.innerText = 'Calculate Walking Route';
            }
        });
    </script>
</body>
</html>
